services:
  - type: web
    name: angel-smartapi
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ANGEL_API_KEY
        sync: false
      - key: ANGEL_CLIENT_ID
        sync: false
      - key: ANGEL_CLIENT_SECRET
        sync: false
      - key: ANGEL_REDIRECT_URI
        sync: false